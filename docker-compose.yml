services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env (see .env.example)}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/src/Epl.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Sql: "Server=mssql,1433;Database=epldb;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=False;TrustServerCertificate=True;"
      Bootstrap__AdminEmail:    ${BOOTSTRAP_ADMIN_EMAIL:-admin@epl.local}
      Bootstrap__AdminPassword: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in .env (see .env.example)}
    depends_on:
      mssql:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      USE_STUBBED_BACKEND: ${USE_STUBBED_BACKEND:-true}
      STUBBED_BACKEND_API_URL: http://api:8080/api
      ACTUAL_BACKEND_API_URL: ${ACTUAL_BACKEND_API_URL:-}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  sqldata: {}
