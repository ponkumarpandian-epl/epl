name: Verify

# Mandatory gate. Configure branch protection on `main` to require:
#   - verify / web-typecheck
#   - verify / api-build
#   - verify / secret-scan
# (Settings → Branches → Branch protection → Require status checks)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

# Cancel earlier in-progress runs on the same ref — keeps queues clean.
concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── 1. Secret scan ──────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so we can scan everything

      - name: Block known dev passwords
        run: |
          set -e
          # Personal SA password, docker dev defaults, hostnames, bootstrap admin password.
          PATTERNS='password@123|Admin_Bootstrap_Passw0rd|Epl_Dev_Passw0rd|USWHGA4VF2\\\\LOCALHOST'
          # Search only tracked files; ignore the docs that legitimately mention the patterns
          # as part of the rotation/recovery instructions in SECRETS.md.
          if git grep -nE "$PATTERNS" -- ':!SECRETS.md' ':!CONTRIBUTING.md' ':!plan/' ':!.github/workflows/' ':!scripts/verify-secrets.mjs' ; then
            echo "::error::A known secret pattern was found in tracked source. Rotate the credential, then remove the value from the file."
            exit 1
          fi
          echo "✓ no known secret patterns found in tracked source"

      - name: Generic hardcoded-secret scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: HEAD
          extra_args: --only-verified

  # ─── 2. Web type-check ───────────────────────────────────────────────────
  web-typecheck:
    name: Web type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root + workspaces
        run: npm ci

      - name: tsc --noEmit
        run: npm run -s verify:web

      - name: ESLint
        run: npm run -s lint --workspace @epl/web

  # ─── 3. .NET API build ───────────────────────────────────────────────────
  api-build:
    name: .NET API build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore apps/api/Epl.Api.slnx

      - name: Build (Release, warnings-as-errors)
        run: dotnet build apps/api/Epl.Api.slnx -c Release --no-restore /warnaserror
